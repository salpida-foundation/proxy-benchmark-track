name: Validate Synthetic Sample Package

on:
  push:
    paths:
      - "README.md"
      - "docs/**"
      - "governance/**"
      - "schemas/**"
      - "sample-data/**"
      - "evaluation-baseline/**"
      - ".github/workflows/validate-synthetic-sample.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "governance/**"
      - "schemas/**"
      - "sample-data/**"
      - "evaluation-baseline/**"
      - ".github/workflows/validate-synthetic-sample.yml"
  workflow_dispatch:

jobs:
  validate-synthetic-sample:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r evaluation-baseline/requirements.txt

      - name: Run synthetic sample package validator
        run: python evaluation-baseline/validate_sample_package.py

      - name: Run boundary language lint
        run: python evaluation-baseline/boundary_lint.py
