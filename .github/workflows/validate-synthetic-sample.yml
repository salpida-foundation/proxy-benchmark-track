name: Validate Synthetic Sample Package

on:
  push:
    branches:
      - main
    paths:
      - "sample-data/**"
      - "schemas/**"
      - "evaluation-baseline/**"
      - ".github/workflows/validate-synthetic-sample.yml"
  pull_request:
    branches:
      - main
    paths:
      - "sample-data/**"
      - "schemas/**"
      - "evaluation-baseline/**"
      - ".github/workflows/validate-synthetic-sample.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-synthetic-sample:
    name: Validate synthetic sample helper structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "evaluation-baseline/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r evaluation-baseline/requirements.txt

      - name: Run synthetic sample package validator
        run: |
          python evaluation-baseline/validate_sample_package.py

      - name: Boundary notice
        if: always()
        run: |
          echo "This workflow validates helper structure only."
          echo "It does not validate benchmark performance."
          echo "It does not validate Sal-Meter input."
          echo "It does not grant CAIS compliance."
          echo "It does not validate diagnostic labels, clinical interpretation, therapeutic use, surveillance scoring, scientific evidence, or raw human data."
