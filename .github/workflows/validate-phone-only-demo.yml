name: Validate Phone-only Synthetic Demo

on:
  workflow_dispatch:
  push:
    paths:
      - "phone-only-simulator/**"
      - ".github/workflows/validate-phone-only-demo.yml"

jobs:
  validate-phone-only-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run phone-only synthetic demo
        run: python phone-only-simulator/run_demo.py

      - name: Confirm demo report exists
        run: test -f phone-only-simulator/demo_output/demo_report_001.json
